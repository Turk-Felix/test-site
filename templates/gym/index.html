<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IronCore Gym</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0b0b;
      color: white;
    }

    header {
      text-align: center;
      padding: 90px 20px;
      background: linear-gradient(135deg, #111, #000);
    }

    h1 {
      font-size: 50px;
      margin: 0;
    }

    p {
      color: #aaa;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #fff;
      color: #000;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      max-width: 900px;
      margin: auto;
      padding: 60px 20px;
    }

    .grid {
      display: grid;
      gap: 15px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>

<body>

  <header>
    <h1>IronCore Gym</h1>
    <p>Train harder. Get stronger. Become unstoppable.</p>
    <a class="btn" href="tel:+352123456">Join Now</a>
  </header>

  <section>
    <h2>Membership Plans</h2>
    <div class="grid">
      <div class="card">Basic — €29/month</div>
      <div class="card">Pro — €49/month</div>
      <div class="card">Elite — €69/month</div>
    </div>
  </section>

  <section>
    <h2>Facilities</h2>
    <div class="grid">
      <div class="card">24/7 Access</div>
      <div class="card">Modern Equipment</div>
      <div class="card">Personal Trainers</div>
    </div>
  </section>

  <footer>
    © IronCore Gym • Luxembourg
  </footer>
  <a href="https://wa.me/352123456" style="
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:14px 16px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
">
    WhatsApp
  </a>
</body>

</html>
